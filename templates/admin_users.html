<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Users and Roles - HR Guru ATS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1017;color:#e8ecf7;padding:10px 12px 16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:0 auto 10px;max-width:calc(100vw - 24px)}.brand{font-size:20px;font-weight:900;color:#fff}.brand span{color:#e8643a}.top-title{color:#9aa5c4;font-size:12px;font-weight:850}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.link-btn,.btn{height:40px;border:1px solid #e8643a;background:#e8643a;color:#fff;border-radius:8px;padding:0 14px;font:inherit;font-size:13px;font-weight:850;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}.link-btn.secondary,.btn.secondary{background:#252a3a;border-color:#343b52;color:#d9dee8}.btn.ghost{background:transparent;border-color:#343b52;color:#c9d2e8}.btn.danger{background:#3a1d22;border-color:#6b2c36;color:#ffb4bd}.btn:hover,.link-btn:hover{filter:brightness(1.08)}.btn:disabled{opacity:.6;cursor:not-allowed}
.profile{position:relative}.profile-btn{width:38px;height:38px;border-radius:50%;border:1px solid #343b52;background:#252a3a;color:#fff;font-weight:900;cursor:pointer}.profile-menu{display:none;position:absolute;right:0;top:46px;z-index:40;min-width:170px;background:#1c2030;border:1px solid #343b52;border-radius:8px;box-shadow:0 16px 34px rgba(0,0,0,.35);overflow:hidden}.profile-menu.active{display:block}.profile-menu a,.profile-menu button{display:block;width:100%;border:0;background:transparent;color:#d9dee8;text-align:left;text-decoration:none;padding:12px 14px;font:inherit;font-size:13px;font-weight:800;cursor:pointer}.profile-menu a:hover,.profile-menu button:hover{background:#252a3a;color:#fff}
.wrap{width:100%;max-width:calc(100vw - 24px);margin:0 auto;background:#1c2030;border:1px solid #2a2f3a;border-radius:10px;overflow:hidden}.head{padding:14px 18px;border-bottom:1px solid #2a2f3a;display:grid;gap:10px}.head-row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.head h1{font-size:22px;color:#fff;margin-bottom:4px}.head p,.muted{color:#9aa5c4;font-size:13px;line-height:1.35}
.tools{display:grid;grid-template-columns:minmax(260px,1fr) auto auto;gap:10px;align-items:end}.field{display:grid;gap:6px;min-width:0}.field label{color:#9aa5c4;font-size:11px;font-weight:900;text-transform:uppercase}.field input,.field select{width:100%;height:40px;background:#252a3a;border:1px solid #343b52;border-radius:8px;color:#fff;font:inherit;font-size:13px;padding:0 12px}.field input:focus,.field select:focus{outline:none;border-color:#e8643a}
.status{padding:8px 18px;color:#9aa5c4;font-size:13px;border-bottom:1px solid #2a2f3a;min-height:36px}.table-wrap{overflow:auto;height:calc(100vh - 226px);min-height:430px}.data-table{width:100%;min-width:920px;border-collapse:collapse;table-layout:fixed}.data-table th,.data-table td{height:40px;padding:7px 9px;border-bottom:1px solid #2a2f3a;border-right:1px solid #2a2f3a;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.data-table th{position:sticky;top:0;z-index:2;background:#0d1017;color:#aab3c8;font-size:12px;font-weight:900}.data-table tr:hover td{background:#222838}
.col-user{width:19%}.col-email{width:24%}.col-role{width:14%}.col-login{width:17%}.col-status{width:10%}.col-actions{width:205px}.pill{display:inline-block;max-width:100%;padding:3px 9px;border-radius:999px;background:#252a3a;border:1px solid #343b52;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;font-size:11px;font-weight:850}.pill.off{background:#3a1d22;border-color:#6b2c36;color:#ffb4bd}.actions{display:flex;gap:5px;flex-wrap:nowrap}.row-btn{height:28px;border-radius:7px;padding:0 8px;font-size:11px;min-width:0}.empty{padding:42px;text-align:center;color:#8b95b5}
.modal{display:none;position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.72);padding:22px;align-items:center;justify-content:center}.modal.active{display:flex}.modal-card{width:min(560px,100%);max-height:88vh;overflow:auto;background:#1c2030;border:1px solid #343b52;border-radius:10px;box-shadow:0 20px 48px rgba(0,0,0,.48)}.modal-head,.modal-foot{padding:16px 18px;border-bottom:1px solid #2a2f3a;display:flex;justify-content:space-between;gap:12px;align-items:center}.modal-foot{border-top:1px solid #2a2f3a;border-bottom:0;justify-content:flex-end}.modal-body{padding:18px;display:grid;gap:14px}.modal h2{font-size:19px;color:#fff}.close{width:32px;height:32px;border-radius:8px;border:1px solid #343b52;background:#252a3a;color:#fff;cursor:pointer;font-size:18px;line-height:1}.check{display:flex;align-items:center;gap:8px;color:#d9dee8;font-size:13px;font-weight:850}.check input{width:auto;height:auto}
.toast{position:fixed;right:18px;bottom:18px;z-index:90;display:none;max-width:420px;border-radius:8px;padding:12px 14px;font-size:13px;box-shadow:0 14px 32px rgba(0,0,0,.35)}.toast.active{display:block}.toast.error{background:#3a1d22;color:#ffb4bd;border:1px solid #6b2c36}.toast.success{background:#173421;color:#9af0b4;border:1px solid #2c6b3b}
@media(max-width:820px){body{padding:8px}.top,.head-row{align-items:flex-start}.wrap,.top{max-width:calc(100vw - 16px)}.top-title{display:none}.head{padding:12px}.head-row{display:grid}.tools{grid-template-columns:1fr}.status{padding:8px 12px}.table-wrap{height:calc(100vh - 300px);min-height:360px}}
</style>
</head>
<body>
<div class="top">
  <div><div class="brand">HR <span>Guru</span></div><div class="top-title">Users and Roles</div></div>
  <div class="top-actions">
    <a class="link-btn secondary" href="/admin">Dashboard</a>
    <div class="profile">
      <button class="profile-btn" type="button" onclick="toggleProfileMenu()" aria-label="Open profile menu">A</button>
      <div class="profile-menu" id="profileMenu">
        <a href="/profile">Profile</a>
        <button type="button" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </div>
</div>
<main class="wrap">
  <div class="head">
    <div class="head-row">
      <div>
        <h1>Users and Roles</h1>
        <p>Manage username/password access without loading the full admin dashboard.</p>
      </div>
    </div>
    <div class="tools">
      <div class="field"><label>Search</label><input id="searchInput" placeholder="Username, email, role" oninput="renderRows()"></div>
      <button class="btn secondary" type="button" onclick="loadRows()">Refresh</button>
      <button class="btn" type="button" onclick="openUserModal()">Add User</button>
    </div>
  </div>
  <div class="status" id="statusText">Loading users...</div>
  <div class="table-wrap" id="tableWrap"></div>
</main>
<div class="modal" id="userModal">
  <div class="modal-card">
    <div class="modal-head"><h2 id="userModalTitle">Add User</h2><button class="close" type="button" onclick="closeUserModal()">&times;</button></div>
    <div class="modal-body">
      <input id="userId" type="hidden">
      <div class="field"><label>Name</label><input id="userName" placeholder="Employee display name"></div>
      <div class="field"><label>Username</label><input id="userUsername"></div>
      <div class="field"><label>Email</label><input id="userEmail" type="email"></div>
      <div class="field"><label id="userPasswordLabel">Password</label><input id="userPassword" type="password" placeholder="Optional for Google login; minimum 8 characters"></div>
      <div class="field"><label>Role</label><select id="userRole"><option>Recruiter</option><option>Team Leader</option><option>Client Viewer</option><option>Bulk Admin</option></select></div>
      <label class="check"><input id="userAdmin" type="checkbox"> Admin User</label>
      <label class="check"><input id="userBulk" type="checkbox"> Bulk Upload User</label>
    </div>
    <div class="modal-foot"><button class="btn secondary" type="button" onclick="closeUserModal()">Cancel</button><button class="btn" type="button" onclick="saveUser()">Save User</button></div>
  </div>
</div>
<div class="modal" id="passwordModal">
  <div class="modal-card">
    <div class="modal-head"><h2 id="passwordTitle">Reset Password</h2><button class="close" type="button" onclick="closePasswordModal()">&times;</button></div>
    <div class="modal-body">
      <input id="passwordUserId" type="hidden">
      <div class="field"><label>New Password</label><input id="passwordValue" type="password" placeholder="Minimum 8 characters"></div>
    </div>
    <div class="modal-foot"><button class="btn secondary" type="button" onclick="closePasswordModal()">Cancel</button><button class="btn" type="button" onclick="savePassword()">Reset Password</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let users=[];
function escapeHtml(value){return String(value ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toggleProfileMenu(){document.getElementById('profileMenu')?.classList.toggle('active');}
document.addEventListener('click',e=>{if(!e.target.closest('.profile'))document.getElementById('profileMenu')?.classList.remove('active');});
function showToast(message,type='error'){const el=document.getElementById('toast');el.textContent=message||'';el.className='toast active '+type;setTimeout(()=>{el.className='toast';},3200);}
function formatLoginTime(value){if(!value)return'Never';const dt=new Date(String(value).includes('T')?String(value):String(value).replace(' ','T'));return Number.isNaN(dt.getTime())?String(value):dt.toLocaleString();}
function filteredUsers(){const q=searchInput.value.trim().toLowerCase();if(!q)return users;return users.filter(u=>[u.username,u.email,u.team_email,u.team_name,u.team_role].some(v=>String(v||'').toLowerCase().includes(q)));}
function rowHtml(u){const email=u.team_email||u.email||'-';const role=u.team_role||(u.is_admin?'Admin':'Recruiter');return `<tr>
  <td class="col-user"><strong>${escapeHtml(u.username||'-')}</strong></td>
  <td class="col-email">${escapeHtml(email)}</td>
  <td class="col-role"><span class="pill">${escapeHtml(role)}</span></td>
  <td class="col-login">${escapeHtml(formatLoginTime(u.last_login_at||u.team_last_login_at))}</td>
  <td class="col-status"><span class="pill ${u.is_active?'':'off'}">${u.is_active?'Active':'Inactive'}</span></td>
  <td class="col-actions"><div class="actions">
    <button class="btn secondary row-btn" type="button" onclick="editUser(${u.id})">Edit</button>
    <button class="btn secondary row-btn" type="button" onclick="openPasswordModal(${u.id})">Pass</button>
    <button class="btn ${u.is_active?'danger':'ghost'} row-btn" type="button" onclick="patchUser(${u.id},{is_active:${u.is_active?0:1}},'User access updated')">${u.is_active?'Off':'On'}</button>
  </div></td>
</tr>`;}
function renderRows(){const rows=filteredUsers();statusText.textContent=rows.length?`${rows.length} users shown`:'No users found';tableWrap.innerHTML=rows.length?`<table class="data-table"><thead><tr><th class="col-user">Username</th><th class="col-email">Email</th><th class="col-role">Role</th><th class="col-login">Last Login</th><th class="col-status">Status</th><th class="col-actions">Actions</th></tr></thead><tbody>${rows.map(rowHtml).join('')}</tbody></table>`:'<div class="empty">No users found.</div>';}
async function loadRows(){statusText.textContent='Loading users...';try{const res=await fetch('/api/users');const data=await res.json().catch(()=>[]);if(!res.ok||data.error)throw new Error(data.error||'Unable to load users');users=Array.isArray(data)?data:[];renderRows();}catch(e){statusText.textContent='Unable to load users.';tableWrap.innerHTML='<div class="empty">Unable to load users.</div>';showToast(e.message||'Unable to load users');}}
function openUserModal(){userModalTitle.textContent='Add User';userId.value='';userName.value='';userUsername.value='';userEmail.value='';userPassword.value='';userPasswordLabel.textContent='Password (optional for Google login)';userRole.value='Recruiter';userAdmin.checked=false;userBulk.checked=false;document.getElementById('userModal').classList.add('active');}
function editUser(id){const u=users.find(row=>Number(row.id)===Number(id));if(!u)return showToast('User not found');userModalTitle.textContent='Edit User';userId.value=u.id;userName.value=u.team_name||'';userUsername.value=u.username||'';userEmail.value=u.team_email||u.email||'';userPassword.value='';userPasswordLabel.textContent='Password (blank = unchanged)';userRole.value=u.team_role||(u.is_admin?'Admin':'Recruiter');userAdmin.checked=!!u.is_admin;userBulk.checked=!!u.is_bulk_admin;document.getElementById('userModal').classList.add('active');}
function closeUserModal(){document.getElementById('userModal').classList.remove('active');}
async function saveUser(){const id=userId.value;const password=userPassword.value;const body={name:userName.value.trim(),username:userUsername.value.trim(),email:userEmail.value.trim(),role:userRole.value,is_admin:userAdmin.checked,is_bulk_admin:userBulk.checked};if(password)body.password=password;if(!body.username)return showToast('Username is required');if(!id&&!password&&!body.email)return showToast('Enter email for Google login or set a password');if(password&&password.length<8)return showToast('Password must be at least 8 characters');const res=await fetch(id?'/api/users/'+id:'/api/users',{method:id?'PATCH':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok||data.error)return showToast(data.error||'Unable to save user');closeUserModal();showToast(id?'User updated':'User added','success');loadRows();}
function openPasswordModal(id){const u=users.find(row=>Number(row.id)===Number(id));passwordUserId.value=id;passwordValue.value='';passwordTitle.textContent='Reset Password'+(u?` - ${u.username}`:'');document.getElementById('passwordModal').classList.add('active');}
function closePasswordModal(){document.getElementById('passwordModal').classList.remove('active');}
async function savePassword(){const id=passwordUserId.value;const password=passwordValue.value;if(password.length<8)return showToast('Password must be at least 8 characters');await patchUser(id,{password},'Password reset successfully');closePasswordModal();}
async function patchUser(id,body,message){const res=await fetch('/api/users/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const data=await res.json().catch(()=>({}));if(!res.ok||data.error)return showToast(data.error||'Unable to update user');showToast(message||'User updated','success');loadRows();}
async function signOut(){await fetch('/api/logout',{method:'POST'});localStorage.removeItem('hrguru_user');window.location.href='/login';}
document.addEventListener('DOMContentLoaded',loadRows);
</script>
</body>
</html>
