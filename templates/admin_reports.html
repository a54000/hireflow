<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reports - HR Guru ATS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1017;color:#e8ecf7;padding:10px 12px 16px}
.top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:0 auto 10px;max-width:calc(100vw - 24px)}.brand{font-size:20px;font-weight:900;color:#fff}.brand span{color:#e8643a}.top-title{color:#9aa5c4;font-size:12px;font-weight:850}
.top-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.link-btn,.btn{height:40px;border:1px solid #e8643a;background:#e8643a;color:#fff;border-radius:8px;padding:0 14px;font:inherit;font-size:13px;font-weight:850;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap}.link-btn.secondary,.btn.secondary{background:#252a3a;border-color:#343b52;color:#d9dee8}.btn.ghost{background:transparent;border-color:#343b52;color:#c9d2e8}.btn:hover,.link-btn:hover{filter:brightness(1.08)}.btn:disabled{opacity:.6;cursor:not-allowed}
.profile{position:relative}.profile-btn{width:38px;height:38px;border-radius:50%;border:1px solid #343b52;background:#252a3a;color:#fff;font-weight:900;cursor:pointer}.profile-menu{display:none;position:absolute;right:0;top:46px;z-index:40;min-width:170px;background:#1c2030;border:1px solid #343b52;border-radius:8px;box-shadow:0 16px 34px rgba(0,0,0,.35);overflow:hidden}.profile-menu.active{display:block}.profile-menu a,.profile-menu button{display:block;width:100%;border:0;background:transparent;color:#d9dee8;text-align:left;text-decoration:none;padding:12px 14px;font:inherit;font-size:13px;font-weight:800;cursor:pointer}.profile-menu a:hover,.profile-menu button:hover{background:#252a3a;color:#fff}
.wrap{width:100%;max-width:calc(100vw - 24px);margin:0 auto;background:#1c2030;border:1px solid #2a2f3a;border-radius:10px;overflow:hidden}.head{padding:14px 18px;border-bottom:1px solid #2a2f3a;display:grid;gap:10px}.head-row{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.head h1{font-size:22px;color:#fff;margin-bottom:4px}.head p,.muted{color:#9aa5c4;font-size:13px;line-height:1.35}
.tools{display:grid;grid-template-columns:minmax(230px,1fr) 160px 160px auto auto;gap:10px;align-items:end}.field{display:grid;gap:6px;min-width:0}.field label{color:#9aa5c4;font-size:11px;font-weight:900;text-transform:uppercase}.field input,.field select{width:100%;height:40px;background:#252a3a;border:1px solid #343b52;border-radius:8px;color:#fff;font:inherit;font-size:13px;padding:0 12px}.field input:focus,.field select:focus{outline:none;border-color:#e8643a}
.quick{display:flex;gap:8px;flex-wrap:wrap}.quick .btn{height:34px;font-size:12px;padding:0 11px}.status{padding:8px 18px;color:#9aa5c4;font-size:13px;border-bottom:1px solid #2a2f3a;min-height:36px}.content{height:calc(100vh - 238px);min-height:430px;overflow:auto;padding:18px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px}.metric{border:1px solid #343b52;background:#151923;border-radius:8px;padding:13px;display:grid;gap:4px}.metric strong{font-size:30px;color:#fff;line-height:1}.metric span{font-size:12px;color:#bac4df;font-weight:850}
.section-title{display:flex;justify-content:space-between;align-items:center;gap:12px;margin:0 0 10px}.section-title h2{font-size:17px;color:#fff}.section-title span{font-size:12px;color:#9aa5c4;font-weight:850}.data-table{width:100%;border-collapse:collapse;table-layout:fixed;background:#1b2130;border:1px solid #2a2f3a;border-radius:8px;overflow:hidden}.data-table th,.data-table td{height:42px;padding:8px 10px;border-bottom:1px solid #2a2f3a;border-right:1px solid #2a2f3a;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}.data-table th{position:sticky;top:-18px;z-index:2;background:#0d1017;color:#aab3c8;font-size:12px;font-weight:900}.data-table td.num,.data-table th.num{text-align:right}.data-table tr:hover td{background:#222838}
.bar-list{display:grid;gap:10px}.bar-row{background:#252a3a;border:1px solid #343b52;border-radius:8px;padding:11px 12px}.bar-top{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px;font-size:13px;font-weight:850}.bar-track{height:10px;background:#151923;border-radius:999px;overflow:hidden}.bar-fill{height:100%;background:linear-gradient(90deg,#e8643a,#5eead4);border-radius:999px}.chips{display:flex;gap:8px;flex-wrap:wrap}.chip{background:#252a3a;border:1px solid #343b52;border-radius:999px;padding:7px 12px;font-size:13px;font-weight:850}.chip em{font-style:normal;color:#e8643a}.empty{padding:42px;text-align:center;color:#8b95b5}.toast{position:fixed;right:18px;bottom:18px;z-index:90;display:none;max-width:420px;border-radius:8px;padding:12px 14px;font-size:13px;box-shadow:0 14px 32px rgba(0,0,0,.35)}.toast.active{display:block}.toast.error{background:#3a1d22;color:#ffb4bd;border:1px solid #6b2c36}.toast.success{background:#173421;color:#9af0b4;border:1px solid #2c6b3b}
.compact-pending .head{padding:10px 14px;gap:8px}.compact-pending .head h1{font-size:20px;margin-bottom:2px}.compact-pending .head p{font-size:12px}.compact-pending .tools{grid-template-columns:minmax(260px,360px) auto auto;align-items:end}.compact-pending .tools .field:nth-child(2),.compact-pending .tools .field:nth-child(3),.compact-pending .quick{display:none}.compact-pending .status{display:none}.compact-pending .content{height:calc(100vh - 150px);min-height:360px;padding:12px 14px}.pending-directory{max-width:820px;display:grid;gap:10px}.pending-top{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid #343b52;background:#151923;border-radius:8px;padding:10px 12px}.pending-count{display:flex;align-items:center;gap:10px}.pending-count strong{font-size:26px;color:#fff;line-height:1}.pending-count span{display:block;color:#bac4df;font-size:12px;font-weight:850}.pending-search{height:38px;width:min(360px,100%);background:#252a3a;border:1px solid #343b52;border-radius:8px;color:#fff;font:inherit;font-size:13px;padding:0 12px}.pending-search:focus{outline:none;border-color:#ef4444}.pending-list{display:grid;gap:6px}.pending-user{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:48px;border:1px solid #2a2f3a;background:#202636;border-radius:8px;padding:8px 10px}.pending-user:hover{border-color:#ef4444;background:#242b3b}.pending-user strong{display:block;color:#fff;font-size:13px;line-height:1.2}.pending-user span{display:block;color:#9aa5c4;font-size:12px;line-height:1.25;margin-top:2px}.pending-pill{flex:0 0 auto;border:1px solid rgba(239,68,68,.45);background:rgba(239,68,68,.14);color:#ffb4bd;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:950;white-space:nowrap}.pending-empty{border:1px dashed #343b52;border-radius:8px;padding:26px;text-align:center;color:#8b95b5;font-size:13px}
@media(max-width:980px){.tools{grid-template-columns:1fr 1fr}.tools .btn{width:100%}.content{height:calc(100vh - 310px)}}@media(max-width:680px){body{padding:8px}.wrap,.top{max-width:calc(100vw - 16px)}.top-title{display:none}.head{padding:12px}.head-row{display:grid}.tools{grid-template-columns:1fr}.status{padding:8px 12px}.content{padding:12px;height:auto;min-height:360px}.data-table{min-width:680px}}
</style>
</head>
<body>
<div class="top">
  <div><div class="brand">HR <span>Guru</span></div><div class="top-title">Reports</div></div>
  <div class="top-actions">
    <a class="link-btn secondary" href="/admin">Dashboard</a>
    <div class="profile">
      <button class="profile-btn" type="button" onclick="toggleProfileMenu()" aria-label="Open profile menu">A</button>
      <div class="profile-menu" id="profileMenu">
        <a href="/profile">Profile</a>
        <button type="button" onclick="signOut()">Sign Out</button>
      </div>
    </div>
  </div>
</div>
<main class="wrap">
  <div class="head">
    <div class="head-row">
      <div>
        <h1>Reports</h1>
        <p>Run admin reports without loading the full ATS workspace.</p>
      </div>
    </div>
    <div class="tools">
      <div class="field">
        <label>Report</label>
        <select id="reportType" onchange="loadReportData()">
          <option value="daily_dashboard">Today by Recruiter</option>
          <option value="sourcer" selected>Performance by Sourcer</option>
          <option value="sourcer_today">Submission Count Today</option>
          <option value="summary">Candidate Summary</option>
          <option value="status">Status Distribution</option>
          <option value="skills">Skills Analysis</option>
          <option value="submissions">Submission History</option>
          <option value="no_submission_today">Recruiters Pending Submission</option>
        </select>
      </div>
      <div class="field"><label>From</label><input id="reportFromDate" type="date"></div>
      <div class="field"><label>To</label><input id="reportToDate" type="date"></div>
      <button class="btn secondary" type="button" onclick="loadReportData()">Generate</button>
      <button class="btn" type="button" onclick="exportReport()">Export CSV</button>
    </div>
    <div class="quick">
      <button class="btn ghost" type="button" onclick="setReportPeriod('today')">Today</button>
      <button class="btn ghost" type="button" onclick="setReportPeriod('week')">This Week</button>
      <button class="btn ghost" type="button" onclick="setReportPeriod('month')">This Month</button>
      <button class="btn ghost" type="button" onclick="setReportPeriod('clear')">Clear Dates</button>
    </div>
  </div>
  <div class="status" id="statusText">Loading report...</div>
  <div class="content" id="reportContent"></div>
</main>
<div class="toast" id="toast"></div>
<script>
let currentReportSnapshot=null;
function escapeHtml(value){return String(value ?? '').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function toggleProfileMenu(){document.getElementById('profileMenu')?.classList.toggle('active');}
document.addEventListener('click',e=>{if(!e.target.closest('.profile'))document.getElementById('profileMenu')?.classList.remove('active');});
function showToast(message,type='error'){const el=document.getElementById('toast');el.textContent=message||'';el.className='toast active '+type;setTimeout(()=>{el.className='toast';},3200);}
function setStatus(text){document.getElementById('statusText').textContent=text||'';}
function metric(label,value){return `<div class="metric"><strong>${escapeHtml(value ?? 0)}</strong><span>${escapeHtml(label)}</span></div>`;}
function table(columns,rows,emptyText){
  if(!rows||!rows.length)return `<div class="empty">${escapeHtml(emptyText||'No data found.')}</div>`;
  const head=columns.map(c=>`<th class="${c.num?'num':''}">${escapeHtml(c.label)}</th>`).join('');
  const body=rows.map(row=>`<tr>${columns.map(c=>`<td class="${c.num?'num':''}">${escapeHtml(row[c.key] ?? '-')}</td>`).join('')}</tr>`).join('');
  return `<table class="data-table"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
}
function section(title,body,note=''){return `<div class="section-title"><h2>${escapeHtml(title)}</h2><span>${escapeHtml(note)}</span></div>${body}`;}
function renderDailyDashboard(data){
  const totals=data.totals||{};
  const rows=(data.rows||[]).map(r=>({recruiter:r.recruiter||'-',requirement:r.requirement||'-',submissions:r.submissions||0}));
  return `<div class="metrics">${metric('Submissions Today',totals.submissions||0)}${metric('Recruiters Active',totals.recruiters||0)}${metric('Requirements Worked',totals.requirements||0)}</div>`+
    section('Today by Recruiter and Requirement',table([{key:'recruiter',label:'Recruiter'},{key:'requirement',label:'Requirement'},{key:'submissions',label:'Submissions',num:true}],rows,'No submissions today.'),data.date||'');
}
function renderSummary(data){
  const byStatus=(data.by_status||[]).map(r=>({status:r.status||'-',count:r.cnt||0}));
  const byRole=(data.by_role||[]).map(r=>({role:r.role_name||'-',count:r.cnt||0}));
  return `<div class="metrics">${metric('Total Candidates',data.total||0)}</div>`+
    section('By Status',table([{key:'status',label:'Status'},{key:'count',label:'Count',num:true}],byStatus,'No status data.'))+
    '<div style="height:18px"></div>'+
    section('Top Roles',table([{key:'role',label:'Role'},{key:'count',label:'Count',num:true}],byRole,'No role data.'));
}
function renderSourcer(data){
  const rows=(Array.isArray(data)?data:[]).map(r=>({sourcer:r.sourcer||'-',submissions:r.submissions||0,success:r.success||0}));
  return section('Sourcer Performance',table([{key:'sourcer',label:'Sourcer'},{key:'submissions',label:'Submissions',num:true},{key:'success',label:'Success',num:true}],rows,'No sourcer data.'));
}
function renderSourcerToday(data){
  const list=Array.isArray(data&&data.rows)?data.rows:(Array.isArray(data)?data:[]);
  const totals=data&&data.totals?data.totals:{};
  const max=Math.max(1,...list.map(r=>Number(r.submissions||0)));
  const bars=list.length?`<div class="bar-list">${list.map(r=>{const n=Number(r.submissions||0);const w=Math.max(5,Math.round((n/max)*100));return `<div class="bar-row"><div class="bar-top"><span>${escapeHtml(r.sourcer||'-')}</span><span>${n}</span></div><div class="bar-track"><div class="bar-fill" style="width:${w}%"></div></div></div>`;}).join('')}</div>`:'<div class="empty">No submissions today.</div>';
  return `<div class="metrics">${metric('Submissions Today',totals.submissions||0)}${metric('Sourcers Active',totals.sourcers||list.length||0)}</div>`+section('Submission Count Today by Sourcer',bars,data.date||'');
}
function renderStatus(data){
  const rows=(Array.isArray(data)?data:[]).map(r=>({status:r.status||'-',count:r.count||0}));
  return section('Status Distribution',table([{key:'status',label:'Status'},{key:'count',label:'Count',num:true}],rows,'No status data.'));
}
function renderSkills(data){
  const rows=Array.isArray(data)?data:[];
  const chips=rows.length?`<div class="chips">${rows.map(r=>`<span class="chip">${escapeHtml(r.skill||'-')} <em>${escapeHtml(r.count||0)}</em></span>`).join('')}</div>`:'<div class="empty">No skill data.</div>';
  return section('Top Skills',chips);
}
function renderSubmissions(data){
  const rows=(Array.isArray(data)?data:[]).map(r=>({date:r.date||'-',count:r.count||0}));
  return section('Daily Submissions',table([{key:'date',label:'Date'},{key:'count',label:'Submissions',num:true}],rows,'No submission data.'));
}
function renderPending(data){
  const rows=(Array.isArray(data)?data:[]).map(r=>({name:r.name||'-',email:r.email||'-'}));
  const list=rows.length
    ? rows.map(r=>`<div class="pending-user" data-pending-user="${escapeHtml((r.name+' '+r.email).toLowerCase())}"><div><strong>${escapeHtml(r.name)}</strong><span>${escapeHtml(r.email)}</span></div><em class="pending-pill">No submission today</em></div>`).join('')
    : '<div class="pending-empty">All recruiters have submitted today.</div>';
  return `<div class="pending-directory">
    <div class="pending-top">
      <div class="pending-count"><strong>${escapeHtml(rows.length)}</strong><span>Non-compliant users<br>${escapeHtml(new Date().toISOString().slice(0,10))}</span></div>
      <button class="btn secondary" type="button" onclick="exportReport()">Export CSV</button>
    </div>
    <input class="pending-search" id="pendingSearch" placeholder="Search name or email" oninput="filterPendingUsers()">
    <div class="pending-list" id="pendingList">${list}</div>
  </div>`;
}
function filterPendingUsers(){
  const q=String(document.getElementById('pendingSearch')?.value||'').trim().toLowerCase();
  document.querySelectorAll('.pending-user').forEach(row=>{
    row.style.display=String(row.getAttribute('data-pending-user')||'').includes(q)?'flex':'none';
  });
}
async function loadReportData(){
  const reportType=document.getElementById('reportType').value;
  const fromDate=document.getElementById('reportFromDate').value;
  const toDate=document.getElementById('reportToDate').value;
  const container=document.getElementById('reportContent');
  document.body.classList.toggle('compact-pending',reportType==='no_submission_today');
  container.innerHTML='<div class="empty">Loading report...</div>';
  setStatus('Loading report...');
  try{
    let url='';
    if(reportType==='no_submission_today'){
      url='/api/reporting/no_submission_today';
    }else{
      const params=new URLSearchParams();
      params.set('type',reportType);
      if(fromDate)params.set('from_date',fromDate);
      if(toDate)params.set('to_date',toDate);
      url='/api/reports?'+params.toString();
    }
    const res=await fetch(url);
    const data=await res.json().catch(()=>({}));
    if(!res.ok||data.error)throw new Error(data.error||'Unable to load report');
    currentReportSnapshot={reportType,fromDate,toDate,data:JSON.parse(JSON.stringify(data||{}))};
    if(reportType==='daily_dashboard')container.innerHTML=renderDailyDashboard(data);
    else if(reportType==='summary')container.innerHTML=renderSummary(data);
    else if(reportType==='sourcer')container.innerHTML=renderSourcer(data);
    else if(reportType==='sourcer_today')container.innerHTML=renderSourcerToday(data);
    else if(reportType==='status')container.innerHTML=renderStatus(data);
    else if(reportType==='skills')container.innerHTML=renderSkills(data);
    else if(reportType==='submissions')container.innerHTML=renderSubmissions(data);
    else if(reportType==='no_submission_today')container.innerHTML=renderPending(data);
    setStatus('Report loaded.');
  }catch(e){
    setStatus('Unable to load report.');
    container.innerHTML='<div class="empty">Error: '+escapeHtml(e.message||'Unable to load report')+'</div>';
    showToast(e.message||'Unable to load report');
  }
}
function escapeCsvValue(value){const text=String(value??'');return /[",\n\r]/.test(text)?'"'+text.replace(/"/g,'""')+'"':text;}
function downloadCsv(filename,rows){const csv=rows.map(row=>row.map(escapeCsvValue).join(',')).join('\r\n');const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url);}
function exportReport(){
  const snapshot=currentReportSnapshot||{};
  const reportType=snapshot.reportType||document.getElementById('reportType').value;
  const data=snapshot.data||{};
  const stamp=new Date().toISOString().slice(0,10);
  let rows=[];
  if(reportType==='daily_dashboard'){rows=[['Daily Dashboard Report'],['Recruiter','Requirement','Submissions']];(data.rows||[]).forEach(r=>rows.push([r.recruiter||'-',r.requirement||'-',r.submissions||0]));}
  else if(reportType==='summary'){rows=[['Summary Report'],['By Status'],['Status','Count']];(data.by_status||[]).forEach(r=>rows.push([r.status||'-',r.cnt||0]));rows.push([],['Top Roles'],['Role','Count']);(data.by_role||[]).forEach(r=>rows.push([r.role_name||'-',r.cnt||0]));}
  else if(reportType==='sourcer'){rows=[['Sourcer Performance Report'],['Sourcer','Submissions','Success']];(Array.isArray(data)?data:[]).forEach(r=>rows.push([r.sourcer||'-',r.submissions||0,r.success||0]));}
  else if(reportType==='sourcer_today'){rows=[['Submission Count Today by Sourcer'],['Sourcer','Submissions']];(Array.isArray(data&&data.rows)?data.rows:[]).forEach(r=>rows.push([r.sourcer||'-',r.submissions||0]));}
  else if(reportType==='status'){rows=[['Status Distribution Report'],['Status','Count']];(Array.isArray(data)?data:[]).forEach(r=>rows.push([r.status||'-',r.count||0]));}
  else if(reportType==='skills'){rows=[['Top Skills Report'],['Skill','Count']];(Array.isArray(data)?data:[]).forEach(r=>rows.push([r.skill||'-',r.count||0]));}
  else if(reportType==='submissions'){rows=[['Daily Submissions Report'],['Date','Submissions']];(Array.isArray(data)?data:[]).forEach(r=>rows.push([r.date||'-',r.count||0]));}
  else if(reportType==='no_submission_today'){rows=[['Recruiters Pending Submission'],['Name','Email']];(Array.isArray(data)?data:[]).forEach(r=>rows.push([r.name||'-',r.email||'-']));}
  if(!rows.length)return showToast('Nothing to export for this report type.');
  downloadCsv('report_'+reportType+'_'+stamp+'.csv',rows);
}
function setReportPeriod(period){
  const from=document.getElementById('reportFromDate');
  const to=document.getElementById('reportToDate');
  if(period==='clear'){from.value='';to.value='';loadReportData();return;}
  const today=new Date();
  const toDate=today.toISOString().slice(0,10);
  let fromDate=toDate;
  if(period==='week'){const d=new Date(today);d.setDate(today.getDate()-6);fromDate=d.toISOString().slice(0,10);}
  if(period==='month'){fromDate=toDate.slice(0,7)+'-01';}
  from.value=fromDate;to.value=toDate;loadReportData();
}
async function signOut(){await fetch('/api/logout',{method:'POST'});localStorage.removeItem('hrguru_user');window.location.href='/login';}
function applyInitialReportFromUrl(){
  const params=new URLSearchParams(window.location.search);
  const type=params.get('type')||params.get('report');
  const select=document.getElementById('reportType');
  if(type&&select&&[...select.options].some(option=>option.value===type)){
    select.value=type;
  }
}
document.addEventListener('DOMContentLoaded',()=>{applyInitialReportFromUrl();loadReportData();});
</script>
</body>
</html>
