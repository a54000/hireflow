<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGradIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFC700"/>
      <stop offset="100%" style="stop-color:#FF9500"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#goldGradIcon)"/>
  
  <!-- Inner dark circle -->
  <circle cx="50" cy="50" r="42" fill="#121212"/>
  
  <!-- HR Letters -->
  <text x="50" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#goldGradIcon)" text-anchor="middle">HR</text>
  
  <!-- Small accent underline -->
  <rect x="35" y="68" width="30" height="2" fill="url(#goldGradIcon)"/>
</svg>
